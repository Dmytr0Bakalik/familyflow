const logEl = document.getElementById('log');
function log(msg, cls='info') {
  logEl.innerHTML += `<span class="${cls}">${msg}\n</span>`;
  logEl.scrollTop = logEl.scrollHeight;
}

async function runImport() {
  const btn = document.getElementById('btnImport');
  btn.disabled = true;
  logEl.innerHTML = '';
  log('🚀 Починаю імпорт...', 'info');

  let ok = 0, fail = 0;
  for (const tx of TRANSACTIONS) {
    try {
      const res = await fetch(`${DB_URL}/transactions.json`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...tx, createdAt: Date.now() + ok })
      });
      const data = await res.json();
      if (data.name) {
        ok++;
        log(`✅ ${tx.date}  ${tx.categoryLabel}  ${tx.amount}€`, 'ok');
      } else {
        fail++;
        log(`❌ Помилка: ${JSON.stringify(data)}`, 'err');
      }
    } catch(e) {
      fail++;
      log(`❌ ${e.message}`, 'err');
    }
    await new Promise(r => setTimeout(r, 100));
  }

  if (fail === 0) {
    log(`\n🎉 Готово! Імпортовано ${ok} записів.`, 'done');
    log(`👉 Відкривай https://familyflow-indol.vercel.app`, 'done');
  } else {
    log(`\n⚠️ ${ok} ОК, ${fail} помилок`, 'err');
  }
  btn.disabled = false;
}
